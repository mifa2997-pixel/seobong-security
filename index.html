<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서봉초 보안점검</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { ShieldCheck, LogOut, ClipboardCheck, Clock, Settings } = lucide;

        const firebaseConfig = {
            apiKey: "AIzaSyDRPq0wBYhatVrLOos3uZB9zSD8bzyszi8",
            authDomain: "seobong-security.firebaseapp.com",
            projectId: "seobong-security",
            storageBucket: "seobong-security.firebasestorage.app",
            messagingSenderId: "221313692552",
            appId: "1:221313692552:web:0106988936043c5a20c03d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [role, setRole] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [checklist, setChecklist] = useState({ lights: false, windows: false, security: false, ac: false, trash: false });

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("Auth Error:", e));
            }, []);

            const handleSubmit = async () => {
                if (!Object.values(checklist).every(v => v)) { alert("모든 항목을 체크해주세요!"); return; }
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc('seobong-security-app').collection('public').doc('data').collection('security_logs').add({
                        role,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        checklist,
                        date: new Date().toLocaleDateString('ko-KR')
                    });
                    alert("제출되었습니다!");
                    setRole(null);
                    setChecklist({ lights: false, windows: false, security: false, ac: false, trash: false });
                } catch (e) { alert("오류 발생: " + e.message); }
                finally { setIsSubmitting(false); }
            };

            if (!role) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <ShieldCheck className="w-16 h-16 text-blue-600 mb-4" />
                    <h1 className="text-2xl font-bold mb-8">서봉초 보안점검</h1>
                    <div className="w-full max-w-xs space-y-4">
                        <button onClick={() => setRole('돌봄선생님')} className="w-full p-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2"><ClipboardCheck /> 돌봄 선생님</button>
                        <button onClick={() => setRole('19시이후퇴청자')} className="w-full p-4 bg-indigo-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2"><Clock /> 19시 퇴청자</button>
                        <button onClick={() => setRole('관리자')} className="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold flex items-center justify-center gap-2"><Settings /> 행정실 관리자</button>
                    </div>
                </div>
            );

            return (
                <div className="p-6 max-w-md mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-xl font-bold">{role} 점검</h2>
                        <button onClick={() => setRole(null)}><LogOut className="text-slate-400" /></button>
                    </div>
                    <div className="space-y-3 mb-8">
                        {Object.keys(checklist).map(key => (
                            <label key={key} className="flex items-center gap-3 p-4 bg-white rounded-2xl border cursor-pointer">
                                <input type="checkbox" checked={checklist[key]} onChange={e => setChecklist({...checklist, [key]: e.target.checked})} className="w-5 h-5 rounded text-blue-600" />
                                <span className="text-slate-700 font-medium">
                                    {key === 'lights' ? '소등 완료' : key === 'windows' ? '창문 및 문 잠금' : key === 'security' ? '세콤(지문) 가동' : key === 'ac' ? '냉난방기 OFF' : '정리 및 쓰레기'}
                                </span>
                            </label>
                        ))}
                    </div>
                    <button onClick={handleSubmit} disabled={isSubmitting} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg disabled:bg-slate-300">
                        {isSubmitting ? "전송 중..." : "점검 보고 제출"}
                    </button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
